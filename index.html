<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Melody 🖤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuentes góticas y elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* Estilos Personalizados y Animaciones */
        body {
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            --color-1: #0a0a0a;
            --color-2: #1a1a2e;
            --color-3: #16213e;
        }

        .font-gothic {
            font-family: 'Cinzel', serif;
        }

        /* Degradado de Fondo Animado */
        .animated-gradient {
            background: linear-gradient(45deg, var(--color-1), var(--color-2), var(--color-3), #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            transition: --color-1 1s ease, --color-2 1s ease, --color-3 1s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animaciones de Partículas */
        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(20deg); opacity: 0; }
        }

        @keyframes float-down {
            0% { transform: translateY(-10vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(100vh) scale(1.2) rotate(-20deg); opacity: 0; }
        }

        @keyframes creep {
            0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0.2; }
            25% { transform: translateX(-10px) translateY(-20px) rotate(-10deg); opacity: 0.8; }
            75% { transform: translateX(10px) translateY(20px) rotate(10deg); opacity: 0.8; }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            will-change: transform, opacity;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));
        }

        .float-up { animation: float-up linear forwards; }
        .float-down { animation: float-down linear forwards; }
        .creep { animation: creep ease-in-out infinite alternate; }

        /* Animación de entrada de la imagen */
        .image-enter {
            animation: pop-in 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pop-in {
            0% { transform: scale(0.8) rotate(-5deg); opacity: 0; filter: grayscale(100%); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; filter: grayscale(30%); } 
        }

        /* Brillo de texto para temas oscuros */
        .text-glow {
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9), 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Efecto flotante para el marco de la imagen */
        .hover-float {
            animation: gentle-float 4s ease-in-out infinite;
        }

        @keyframes gentle-float {
            0%, 100% { transform: translateY(0); border-color: rgba(255,255,255,0.1); }
            50% { transform: translateY(-10px); border-color: rgba(150, 0, 0, 0.5); }
        }

        /* Capa de transición oscura */
        #flash {
            transition: opacity 0.6s ease-out;
            background-color: #000;
        }

        /* Marco gótico para la imagen */
        .gothic-frame {
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0,0,0,0.8);
            border: 2px solid #333;
        }
    </style>
</head>
<body class="bg-black text-gray-200 select-none w-screen h-screen relative">

    <!-- Contenedor del fondo animado -->
    <div id="bg-container" class="absolute inset-0 z-0 animated-gradient"></div>

    <!-- Contenedor de partículas -->
    <div id="particles-container" class="absolute inset-0 z-0 overflow-hidden"></div>

    <!-- Efecto de transición oscura -->
    <div id="flash" class="absolute inset-0 opacity-0 z-50 pointer-events-none"></div>

    <!-- Contenido Principal -->
    <div class="relative z-10 w-full h-full flex flex-col items-center justify-center p-6 text-center" id="main-area">
        
        <!-- Tarjeta de Imagen -->
        <div id="image-wrapper" class="relative w-64 h-64 sm:w-80 sm:h-80 rounded-full p-1 bg-black/60 backdrop-blur-sm gothic-frame hover-float mb-8 image-enter transition-all duration-500">
            <!-- Imagen con fallback por si falla la carga -->
            <img id="main-image" src="" onerror="this.src='https://placehold.co/800x800/1a1a1a/888888?text=🥀'" alt="Gothic Romance" class="w-full h-full object-cover rounded-full shadow-inner opacity-90 transition-opacity duration-500" style="filter: contrast(1.2) sepia(0.1);">
        </div>

        <!-- Contenido de Texto -->
        <div class="max-w-md mx-auto space-y-4">
            <h1 id="main-quote" class="font-gothic text-4xl sm:text-5xl md:text-6xl text-gray-100 text-glow leading-tight transition-all duration-700 opacity-100 tracking-wider">
                <!-- El texto se inyecta por JS -->
            </h1>
            <p id="sub-quote" class="text-xl sm:text-2xl italic text-gray-300 text-glow transition-all duration-700 opacity-100 mt-4">
                <!-- El texto se inyecta por JS -->
            </p>
        </div>

        <!-- Botón / Llamado a la acción -->
        <div class="absolute bottom-10 left-0 w-full text-center animate-pulse">
            <span id="cta-text" class="bg-black/50 backdrop-blur-md px-6 py-2 rounded-none border border-red-900 text-xs sm:text-sm font-gothic tracking-[0.2em] uppercase text-gray-300 shadow-[0_0_15px_rgba(150,0,0,0.3)] transition-all duration-300">
                <!-- El texto se inyecta por JS -->
            </span>
        </div>

    </div>

    <script>
        // Datos para cada escena (Vibras Góticas, Tim Burton & Metal)
        // Enlaces de imágenes verificados y estables
        const scenes = [
            {
                colors: ['#0a0a0a', '#1a1a2e', '#000000'], // Noche Oscura
                image: 'https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=800&auto=format&fit=crop', // Bosque oscuro verificado
                quote: 'Para Melody...',
                sub: 'En un mundo de sombras, tú eres mi misterio favorito.',
                particleType: '🦇',
                particleCount: 15,
                animation: 'float-up',
                cta: 'Adéntrate en la oscuridad 🥀'
            },
            {
                colors: ['#2b0000', '#0a0a0a', '#1a0000'], // Rojo Sangre & Negro
                image: 'https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=800&auto=format&fit=crop', // Rosa roja sobre negro verificada
                quote: 'Una belleza inusual.',
                sub: 'Al más puro estilo Burton, lo nuestro es extrañamente perfecto.',
                particleType: '🥀',
                particleCount: 20,
                animation: 'float-down',
                cta: 'Sigue tocando 🖤'
            },
            {
                colors: ['#121212', '#2d3436', '#000000'], // Carbón / Metal
                image: 'https://images.unsplash.com/photo-1510915361894-faa8b41ca03c?q=80&w=800&auto=format&fit=crop', // Guitarra oscura verificada
                quote: 'Mi melodía favorita.',
                sub: 'Nuestro amor es como el mejor riff de metal: intenso, brutal y eterno.',
                particleType: '🎸',
                particleCount: 12,
                animation: 'float-up',
                cta: 'Sube el volumen 🤘'
            },
            {
                colors: ['#1f0033', '#000000', '#10001a'], // Morado Profundo / Gótico
                image: 'https://images.unsplash.com/photo-1519077229555-5dc162fbdb94?q=80&w=800&auto=format&fit=crop', // Arquitectura gótica verificada
                quote: 'Reina de mi caos.',
                sub: 'Gobernemos juntos la locura de este mundo roto.',
                particleType: '🕷️',
                particleCount: 15,
                animation: 'creep',
                cta: 'Un paso más 🕸️'
            },
            {
                colors: ['#262626', '#000000', '#1a1a1a'], // Hueso / Gris Oscuro
                image: 'https://images.unsplash.com/photo-1532767153582-b1a0e5145009?q=80&w=800&auto=format&fit=crop', // Luna oscura verificada
                quote: 'Hasta la muerte.',
                sub: 'Y si hay algo más allá, también te buscaría entre los espíritus.',
                particleType: '💀',
                particleCount: 18,
                animation: 'float-up',
                cta: 'La revelación 🌙'
            },
            // --- ESCENA FINAL CON LA IMAGEN DEL USUARIO ---
            {
                colors: ['#3a0000', '#000000', '#1a0008'], // Rojo Sangre Profundo & Negro para el final
                image: '1000031455.jpg', // Imagen proporcionada por el usuario
                quote: 'Melody...',
                sub: 'Eres la más hermosa y perfecta. Mi musa oscura. 🖤',
                particleType: '🦇',
                particleCount: 30,
                animation: 'float-up',
                cta: 'Repetir el conjuro 🔁'
            }
        ];

        let currentIndex = 0;

        // Elementos del DOM
        const bgContainer = document.getElementById('bg-container');
        const mainQuote = document.getElementById('main-quote');
        const subQuote = document.getElementById('sub-quote');
        const mainImage = document.getElementById('main-image');
        const imageWrapper = document.getElementById('image-wrapper');
        const particlesContainer = document.getElementById('particles-container');
        const flash = document.getElementById('flash');
        const ctaText = document.getElementById('cta-text');

        // Función Generadora de Partículas
        function generateParticles(type, count, animationClass) {
            particlesContainer.innerHTML = ''; // Limpiar partículas anteriores
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.innerText = type;
                particle.className = `particle ${animationClass} text-2xl sm:text-4xl absolute`;
                
                // Posicionamiento y tiempo aleatorio
                const leftPos = Math.random() * 100; // 0 a 100%
                const delay = Math.random() * 3; // 0 a 3 segundos
                const duration = 5 + Math.random() * 5; // 5 a 10 segundos (más lento y lúgubre)

                particle.style.left = `${leftPos}%`;
                
                if(animationClass === 'creep') {
                    particle.style.top = `${Math.random() * 100}%`;
                    particle.style.animationDuration = `${3 + Math.random() * 4}s`;
                    particle.style.animationDelay = `${delay}s`;
                } else {
                    particle.style.animationDuration = `${duration}s`;
                    particle.style.animationDelay = `${delay}s`;
                }

                particlesContainer.appendChild(particle);
            }
        }

        // Función para actualizar la escena con transición
        function updateScene() {
            const scene = scenes[currentIndex];

            // 1. Activar Efecto de Desvanecimiento Oscuro
            flash.style.opacity = '1';

            // Esperar al pico del desvanecimiento para cambiar el contenido
            setTimeout(() => {
                // Cambiar Colores de Fondo suavemente
                document.body.style.setProperty('--color-1', scene.colors[0]);
                document.body.style.setProperty('--color-2', scene.colors[1]);
                document.body.style.setProperty('--color-3', scene.colors[2]);

                // Cambiar Textos
                mainQuote.innerText = scene.quote;
                subQuote.innerText = scene.sub;
                ctaText.innerText = scene.cta;

                // Cambiar Imagen y reactivar animación de entrada
                mainImage.src = scene.image;
                imageWrapper.classList.remove('image-enter');
                void imageWrapper.offsetWidth; // Forzar reflow para reiniciar la animación
                imageWrapper.classList.add('image-enter');

                // Generar nuevas partículas
                generateParticles(scene.particleType, scene.particleCount, scene.animation);

                // Desvanecer la oscuridad
                flash.style.opacity = '0';
            }, 500); // 500ms coincide con el pico del desvanecimiento oscuro
        }

        // Escuchar clics/toques en todo el cuerpo
        document.body.addEventListener('click', () => {
            currentIndex++;
            if (currentIndex >= scenes.length) {
                currentIndex = 0; // Volver al inicio
            }
            updateScene();
        });

        // Inicializar la primera escena al cargar
        window.onload = () => {
            // Establecer el contenido inicial sin desvanecimiento
            const initialScene = scenes[0];
            document.body.style.setProperty('--color-1', initialScene.colors[0]);
            document.body.style.setProperty('--color-2', initialScene.colors[1]);
            document.body.style.setProperty('--color-3', initialScene.colors[2]);
            mainImage.src = initialScene.image;
            mainQuote.innerText = initialScene.quote;
            subQuote.innerText = initialScene.sub;
            ctaText.innerText = initialScene.cta;
            generateParticles(initialScene.particleType, initialScene.particleCount, initialScene.animation);
        };

    </script>
</body>
</html>
